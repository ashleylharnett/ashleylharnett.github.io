<!DOCTYPE html>
<html>
  <head>
    <title>Ashley Harnett</title>
    <meta name = "viewport" content = "width=device-width, minimum-scale=1.0, maximum-scale = 1.0, user-scalable = no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@0;1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Galdeano&display=swap" rel="stylesheet">
    <link href="main.css" rel="stylesheet">
  <head>
  <body>
    <div id="page">

      <header id="header">
        <div id="ident">
            <img src="me.jpeg" title="Ashley" alt="Cartoon of a male face wth brown hair, a beard, and glasses.">
        </div>
      </header>

      <section id="contact">
        <h1>Contact me</h1>
        <form action="https://formspree.io/f/xpzbjraw" method="POST">
        
            <div class="form-row">
                <label for="form-name" class="sr-only">Your name:</label>
                <input type="text" name="name" id="form-name" placeholder="Your Name">
            </div>
            
            <div class="form-row">
                <label for="form-email" class="sr-only">Your email:</label>
                <input type="email" name="email" id="form-email" placeholder="Your email">
            </div>
            
            <div class="form-row">
                <label for="form-message" class="sr-only">Your message:</label>
                <textarea name="message" id="form-message" placeholder="Your message"></textarea>
            </div>
            
            <div class="form-row">
                <button type="submit">Send message</button>
            </div>
            
        </form>

      </section>


    </div>
  </body>
</html>
