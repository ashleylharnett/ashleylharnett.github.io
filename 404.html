<!DOCTYPE html>
<html>
  <head>
    <title>404!</title>
    <link rel="stylesheet" href="https://use.typekit.net/keu7odl.css">
    <style>
      html,
      body {
        height: 100%;
        background: #343434;
        overflow: hidden;
        font-family: "p22-typewriter", sans-serif;
        font-weight: 400;
        font-style: normal;
        font-size: 18px;
      }
      #ghost {
        height: 400px;
        width: 400px;
        display: block;
        background: url("ghost.gif") repeat center;
        background-size: contain;
        animation: run 20s;
        animation-delay: 0.5s;
        margin: 0 auto;
      }
      #error-window {
        padding: 0px 100px;
        text-align: center;
        color: white;
      }
    </style>
  </head>
  <body>
    <div id="error-window">
      <div id="ghost"></div>
      <p>The page you're looking for is no longer with us...</p>
      <p>Error 404: the requested URL was not found on the server.</p>
    </div>
  </body>
</html>
